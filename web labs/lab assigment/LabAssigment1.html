<!DOCTYPE html>
<html>
    <head>
        <title>Hs dg expert solutions </title>
        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box ;
                font-family:Arial, sans-serif ;

            }
            .topbar{
                background-color: rgb(4, 112, 69);
                color: aliceblue;
                text-align:center ;
        
            }
            .navbar{
                background-color: rgb(194, 227, 132);
                display: flex;
                color: whitesmoke;
                text-align: center;
                justify-content: space-between;
                align-items: center;
            }
            .logo{

                font-weight: bold;
                color: red;
            }
            .menu-line{
                display:flex;
                gap: 30px;



            }
            .dropdown{
                position: relative;
                cursor: pointer;
            }
            .dropdown>div:first-child{
                font-weight: bold;
            }
            .dropdown-content{
                display: none;
                position: absolute;
                top: 25;
                left:0;
                background-color: white;
                min-width: 150px;
                box-shadow:0 5px 10px rgba(0,0,0,0.2);
                
            }
            .dropdown-content div{
                padding: 10px;
                white-space:  nowrap;
                color: black;
            }
            .dropdown-content div:hover{
                background: #eee;
            }
            .dropdown:hover .dropdown-content{
                display:block;
            }
            .hero{
                color: aqua;
            }
            
        </style> 
    </head>
    <body>
        <div class="topbar">

                    </div>  
                </div>

                <div class="dropdown">

                    <div class="dropdown-content">
                        <div>casual shirt</div>
                        <div>dressshirt</div>
