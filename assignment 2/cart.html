<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RoyalTag - Your Shopping Cart.">
    <title>RoyalTag - Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="nav-container">
            <a class="logo" href="index.html">
                <img src="images/logo.png" alt="RoyalTag Logo">
                <span class="logo-text">RoyalTag</span>
            </a>
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle Menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html" class="active">Cart</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- ===== PAGE HEADER ===== -->
    <div class="page-header">
        <h1>Shopping Cart</h1>
        <p>Review your selected items</p>
    </div>

    <!-- ===== CART SECTION ===== -->
    <section class="cart-section">
        <div class="cart-container">

            <!-- Empty Cart State -->
            <div class="cart-empty">
                <div class="cart-icon">🛒</div>
                <h2>Your cart is empty</h2>
                <p>Looks like you haven't added anything yet.</p>
                <a href="products.html" class="btn-primary">Start Shopping</a>
            </div>

        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <p>&copy; 2025 RoyalTag. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
